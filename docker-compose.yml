  # db:
  #   image: postgres:16-alpine
  #   container_name: module2-db
  #   environment:
  #     POSTGRES_USER: module2
  #     POSTGRES_PASSWORD: module2
  #     POSTGRES_DB: module2
  #   ports:
  #     - "5432:5432"
